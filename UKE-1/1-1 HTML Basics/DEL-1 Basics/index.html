<!-- Forteller nettleseren at dokumentet bruker HTML5 -->
<!DOCTYPE html>

<!-- Starter selve HTML-dokumentet -->
<!-- lang="en" forteller at språket på siden er engelsk -->
<html lang="en">

<!-- Head inneholder informasjon OM nettsiden (metadata) -->
<!-- Innholdet her vises vanligvis ikke direkte på siden -->
<head>

    <!-- Angir tegnsettet som brukes -->
    <!-- UTF-8 støtter nesten alle tegn og språk -->
    <meta charset="UTF-8">

    <!-- Gjør siden responsiv på mobil og nettbrett -->
    <!-- width=device-width gjør at siden tilpasser seg skjermbredden -->
    <!-- initial-scale=1.0 setter start-zoom til normal -->
    <meta name="viewport" content="width=device-width, initial-scale=10.5">

    <!-- Tittelen på nettsiden -->
    <!-- Vises i nettleserfanen -->
    <title>Document</title>

</head>

<!-- Body inneholder alt som vises på nettsiden -->
<!-- For eksempel tekst, bilder, knapper, videoer osv -->
<body>
    <!-- Her kan vi legge inn innholdet på nettsiden -->

</body>

<!-- Slutter HTML-dokumentet -->
</html>
