<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tittel på nettsiden</title>
</head>
<body>
    <!-- KOMMENTAR! CTRL + / eller CMD + /-->

    <!-- Overskrifter i forskjellige nivåer, h1 størst og viktigst -->
    <h1>Overskrift 1</h1>
    <h2>Overskrift 2</h2>
    <h3>Overskrift 3</h3>
    <h4>Overskrift 4</h4>
    <h5>Overskrift 5</h5>
    <h6>Overskrift 6</h6>

    <!-- Vanlig avsnitt -->
    <p>Avsnitt</p>

    <!-- Fet tekst med <b> (kun stil, mindre semantisk) -->
    <b><p>Fet Avsnitt</p></b>

    <!-- Fet tekst med <strong> (semantisk viktig tekst, bedre for tilgjengelighet) -->
    <strong><p>Også Fet Avsnitt</p></strong>

    <!-- Kursiv med <i> (kun stil, mindre semantisk) -->
    <i><p>Kursiv Avsnitt</p></i>

    <!-- Kursiv med <em> (semantisk fremheving, ofte anbefalt) -->
    <em><p>Kursiv Avsnitt</p></em>

    <!-- Uordnet liste (punkter) -->
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <!-- Ordenet liste (nummerert) -->
    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <!-- Bilde -->
    <!-- src= hvor bildet ligger (ekstern/lokal) -->
    <!-- alt= alternativ tekst (Universell Utforming + Om bilde ikke lastes inn) -->
    <!-- Bilder med god alt tekst kan havne i google images -->
    <img
        src="https://static01.nyt.com/images/2020/01/28/multimedia/28xp-memekid3/28cp-memekid3-superJumbo.jpg" 
        alt="baby holding sand"
        height="20%"
        width="20%"
    >

    <a href="https://www.youtube.com/">Youtube</a>
</body>
</html>
